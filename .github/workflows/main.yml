name: Run Puppeteer Bot

on:
    workflow_dispatch:   # اجرای دستی
    push:
        branches: [main] # اختیاری: اجرا بعد از هر push

jobs:
    run-bot:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # ---------- مرحله جدید: نصب ابزار استخراج ----------
            - name: Install p7zip
              run: sudo apt update && sudo apt install -y p7zip-full

            # ---------- مرحله جدید: ایجاد پوشه input (اختیاری) ----------
            - name: Create input directory
              run: mkdir -p input

            # ---------- مرحله جدید: استخراج فایل با رمز ----------
            - name: Extract affect.7z into input
              run: |
                  7z x affect.7z -oinput -p${{ secrets.SEVENZIP_PASSWORD }} -y
              # در صورت خطا (مثلاً فایل ناموجود) میتوانید ادامه دهید یا متوقف کنید

            # ---------- ادامه مراحل قبلی ----------
            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies with Bun
              run: bun install

            - name: Install Chromium
              run: |
                  sudo apt update
                  sudo apt install -y chromium
                  which chromium || which chromium-browser

            - name: Run index.js with Bun
              run: bun index.js
              env:
                  NODE_ENV: production

            - name: Keep bot running (max 6 hours)
              run: |
                  echo "ربات در حال اجراست. حداکثر 6 ساعت بعد توسط GitHub متوقف خواهد شد."