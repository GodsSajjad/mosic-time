name: Run Puppeteer Bot

on:
  workflow_dispatch:
    inputs:
      zip_password:
        description: 'رمز عبور فایل affect.7z'
        required: true
        type: string
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mask password
        run: echo "::add-mask::${{ github.event.inputs.zip_password }}"

      - name: Install p7zip
        run: sudo apt update > /dev/null 2>&1 && sudo apt install -y p7zip-full > /dev/null 2>&1

      - name: Create input directory
        run: mkdir -p input

      - name: Extract affect.7z into input
        run: |
          7z x affect.7z -oinput -p"${{ github.event.inputs.zip_password }}" -y > /dev/null 2>&1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies with Bun
        run: bun install > /dev/null 2>&1

      - name: Install Chromium
        run: |
          sudo apt update > /dev/null 2>&1
          sudo apt install -y chromium > /dev/null 2>&1

      - name: Run index.js with Bun
        run: bun index.js
        env:
          NODE_ENV: production